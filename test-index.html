<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JO Winter - Lab de Test</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; }
        #lab-container { max-width: 800px; margin: auto; background: #34495e; padding: 20px; border-radius: 15px; }
        .plateau-visuel { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 20px 0; }
        .case { width: 40px; height: 40px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 0.8em; position: relative; }
        .pion { position: absolute; width: 20px; height: 20px; background: gold; border-radius: 50%; border: 2px solid black; z-index: 10; }
        
        #quiz-box { background: #ecf0f1; color: #2c3e50; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .btn-reponse { display: block; width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        .btn-reponse:hover { background: #2980b9; }
        
        .stats { display: flex; justify-content: space-around; background: #16a085; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
<div id="setup-menu">
    <h1>Configuration de la partie</h1>
    
    <div id="step-1">
        <label>Nombre de joueurs (1-5) :</label>
        <input type="number" id="nb-joueurs" min="1" max="5" value="2">
        <button onclick="configurerPseudos()">Suivant</button>
    </div>

    <div id="step-2" style="display:none;">
        <div id="pseudo-inputs"></div>
        <button onclick="demarrerLeJeu()">Lancer la quête !</button>
    </div>
</div>

<div id="game-container" style="display:none;">
    </div>
    <div id="lab-container">
        <h1>LAB TEST - BACKEND JO</h1>
        
        <div class="stats">
            <div>Joueur : <span id="nom-joueur">-</span></div>
            <div>Case : <span id="pos-joueur">0</span></div>
            <div>Anneaux : <span id="rings-count">0</span>/5</div>
        </div>

        <div id="board" class="plateau-visuel"></div>

        <button onclick="lancerLeTour()" id="btn-de" style="padding: 15px 30px; font-size: 1.2em; cursor: pointer; margin: 10px;">🎲 Lancer le dé</button>

        <div id="quiz-box">
            <h3 id="q-titre">Question...</h3>
            <div id="q-options"></div>
        </div>
        
        <button onclick="resetPartie()" style="margin-top: 30px; background: #e74c3c; color: white; border: none; padding: 5px 10px; cursor: pointer;">Réinitialiser tout</button>
    </div>

    <script src="api/env.js"></script>
    <script src="api/api-client.js"></script>
    <script src="api/script.js"></script>

    <script>
        // Au chargement, on prépare le plateau visuel
        window.addEventListener('load', () => {
            if (!chargerPartie()) {
                initialiserJoueurs(["Hugo", "Mame"]);
                genererPlateau(20);
            }
            dessinerPlateau();
            refreshUI();
        });

        function dessinerPlateau() {
            const board = document.getElementById('board');
            board.innerHTML = "";
            plateauLogique.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'case';
                div.style.backgroundColor = window._env_.CATEGORIES[c.categorieId].couleur;
                div.id = 'case-' + i;
                div.innerText = i;
                board.appendChild(div);
            });
            placerPion();
        }

        function placerPion() {
            // Supprimer l'ancien pion
            const oldPion = document.querySelector('.pion');
            if(oldPion) oldPion.remove();
            
            // Placer le pion sur la case actuelle du joueur actif
            const j = gameState.joueurs[gameState.indexJoueurActif];
            const caseDest = document.getElementById('case-' + j.position);
            const pion = document.createElement('div');
            pion.className = 'pion';
            caseDest.appendChild(pion);
        }

        async function lancerLeTour() {
            document.getElementById('btn-de').disabled = true;
            const de = lancerDe();
            let j = gameState.joueurs[gameState.indexJoueurActif];

            j.position = (j.position + de) % plateauLogique.length;
            placerPion();
            refreshUI();

            const questionData = await fetchQuestion(j.position);
            afficherQuiz(questionData);
        }

function afficherQuiz(data) {
    const box = document.getElementById('quiz-box');
    document.getElementById('q-titre').innerHTML = `
        <span style="color:${data.themeCouleur}">${data.themeNom}</span><br>
        ${data.question} <br>
        <small>Difficulté : ${data.difficulty}</small>
    `;

    const options = document.getElementById('q-options');
    options.innerHTML = "";
    
    data.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'btn-reponse';
        btn.innerText = opt;
        btn.onclick = () => verifierReponse(index, data.answer);
        options.appendChild(btn);
    });
    box.style.display = 'block';
}

        function verifierReponse(choix, correct) {
            const catId = plateauLogique[gameState.joueurs[gameState.indexJoueurActif].position].categorieId;
            
            if(choix === correct) {
                alert("Bonne réponse !");
                enregistrerVictoireCase(catId);
            } else {
                alert("Faux !");
            }

            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('btn-de').disabled = false;
            passerAuJoueurSuivant(); 
            refreshUI();
            placerPion();
        }

        function refreshUI() {
            const j = gameState.joueurs[gameState.indexJoueurActif];
            document.getElementById('nom-joueur').innerText = j.nom;
            document.getElementById('pos-joueur').innerText = j.position;
            document.getElementById('rings-count').innerText = j.anneaux.filter(a => a).length;
        }
    </script>
</body>
</html>
